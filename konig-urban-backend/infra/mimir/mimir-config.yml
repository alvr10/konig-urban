multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095

ingester:
  ring:
    replication_factor: 1

# S3-compatible (Minio) storage for all components
common:
  storage:
    backend: s3
    s3:
      endpoint: minio:9000
      access_key_id: mimir
      secret_access_key: mimirpass
      insecure: true
      bucket_name: mimir

blocks_storage:
  storage_prefix: blocks
  tsdb:
    dir: /data/tsdb

compactor:
  data_dir: /data/compactor

ruler:
  rule_path: /data/ruler
  enable_api: true
